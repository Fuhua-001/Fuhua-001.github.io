<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Enterprise Quotation Maker</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        margin: 0;
        font-family: "Prompt", "Inter", sans-serif;
      }
      .login-container {
        background: rgba(255, 255, 255, 0.9);
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .login-logo {
        font-size: 3rem;
        color: var(--primary);
        margin-bottom: 1rem;
      }
      .login-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 0.5rem;
      }
      .login-subtitle {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }
      .form-group {
        text-align: left;
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-main);
      }
      .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box;
        background: #f8fafc;
      }
      .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        background: #fff;
      }
      .btn-login {
        width: 100%;
        padding: 0.8rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-top: 1rem;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-logo">
        <i class="fa-solid fa-file-invoice-dollar"></i>
      </div>
      <h1 class="login-title">QuoteAI Enterprise</h1>
      <p class="login-subtitle">เธฅเธเธเธทเนเธญเน€เธเนเธฒเนเธเนเน€เธเธทเนเธญเธเธฑเธ”เธเธฒเธฃเนเธเน€เธชเธเธญเธฃเธฒเธเธฒ</p>

      <form id="login-form">

          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="เน€เธเนเธ PIC001"

        <div class="form-group">

    <script>
      document.getElementById("login-form").addEventListener("submit", (e) => {

    </script>
  </body>
</html>
